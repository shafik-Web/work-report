<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Report | Shafik Khan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-light:#3b82f6;--secondary:#0f172a;--accent:#f59e0b;--text:#e2e8f0;--text-muted:#94a3b8;--card-bg:#1e293b;--border:#334155}
body{font-family:'Segoe UI',sans-serif;background:var(--secondary);color:var(--text)}
.slide{display:none;padding:40px}
.slide.active{display:block}
.title-stat-value{font-size:46px;font-weight:800;color:var(--accent)}
.category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.category-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:18px}
.category-count{font-size:28px;font-weight:800;color:var(--primary-light)}
</style>
</head>
<body>
<div class="slide active">
<h1>Work Report</h1>
<div class="title-stat-value">71</div>
<div class="title-stat-label">Projects Completed</div>
<div class="slide">
<h2>Work Distribution</h2>
<div class="category-grid">
<div class="category-card"><div class="category-name">Emailers</div><div class="category-count">39</div><div class="category-percent">55%</div>
<div class="category-card"><div class="category-name">Websites</div><div class="category-count">7</div><div class="category-percent">10%</div>
<div class="category-card"><div class="category-name">Registration</div><div class="category-count">10</div><div class="category-percent">14%</div>
<div class="category-card"><div class="category-name">Newsletters</div><div class="category-count">5</div><div class="category-percent">7%</div>
<div class="category-card"><div class="category-name">Trip Reports</div><div class="category-count">8</div><div class="category-percent">11%</div>
<div class="category-card"><div class="category-name">Products & Apps</div><div class="category-count">2</div><div class="category-percent">3%</div>
</div>
</body>
</html>
